<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charSet="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Loja | Fulltime Academia</title>
  
  <!-- Fonte Original -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--color-background)',
            foreground: 'var(--color-foreground)',
            card: 'var(--color-card)',
            border: 'var(--color-border)',
            accent: 'var(--color-accent)',
            'primary-cta': 'var(--color-primary-cta)',
            'primary-cta-text': 'var(--color-primary-cta-text)',
            'secondary-cta': 'var(--color-secondary-cta)',
            'secondary-cta-text': 'var(--color-secondary-cta-text)',
          },
          width: {
            'content-width': 'var(--width-content-width)',
          },
          borderRadius: {
            'theme': 'var(--theme-border-radius)',
            'theme-capped': 'var(--theme-border-radius-capped)',
          },
          padding: {
            'hero-page-padding': '8rem',
          },
          spacing: {
            '15': '3.75rem',
            '90': '22.5rem',
            '100': '25rem',
            '4/10': '40%',
            '6/10': '60%',
            '3/10': '30%',
            '7/10': '70%',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      /* Cores e variáveis exatas da plataforma */
      --color-background: #003399;
      --color-foreground: #fafafa;
      --color-card: #383838;
      --color-border: #484848;
      --color-accent: #3b82f6;
      --color-background-accent: #1f2937;
      --color-primary-cta: #fafafa;
      --color-primary-cta-text: #09090b;
      --color-secondary-cta: #27272a;
      --color-secondary-cta-text: #fafafa;

      --radius-lg: 1rem;
      --theme-border-radius: var(--radius-lg);
      --theme-border-radius-capped: var(--radius-lg);
      --width-content-width: clamp(40rem, 75vw, 100rem);
      --width-content-width-expanded: clamp(calc(40rem - (40rem - 100vw) / 2), 87.5vw, calc(100rem + (100vw - 100rem) / 2));
      --vw: clamp(0.5rem, 0.92vw, 1rem);

      --text-base: clamp(0.875rem, 1.058vw, 1rem);
      --width-10: 2.5rem;
      --width-5: 1.25rem;
      --width-17_5: 4.375rem;
      --vw-0_75: 0.75rem;
    }

    @media (max-width: 768px) {
      :root {
        --width-content-width: 85vw;
        --width-content-width-expanded: 90vw;
      }
    }

    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--color-background);
      color: var(--color-foreground);
      overflow-x: hidden;
      font-kerning: none;
      text-rendering: optimizeSpeed;
    }

    h2 {
      font-size: 2.5rem !important;
      line-height: 1.3 !important;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.75rem !important;
      line-height: 1.3 !important;
    }

    .glass-card {
      position: relative;
      background-color: rgba(45, 45, 45, 0.6) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 1.5rem; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start;
      align-items: center;
      transition: transform 0.3s ease, border-color 0.3s ease; 
      height: 100%;
      min-height: 460px;
      gap: 0.5rem;
    }
    .glass-card:hover { 
      transform: translateY(-5px); 
      border-color: rgba(255, 255, 255, 0.3) !important; 
    }

    .primary-button {
      background-color: var(--color-primary-cta);
      background: linear-gradient(to bottom, color-mix(in srgb, var(--color-primary-cta), transparent 25%), var(--color-primary-cta));
      box-shadow: color-mix(in srgb, var(--color-background) 25%, transparent) 0px 1px 1px 0px inset, color-mix(in srgb, var(--color-primary-cta) 15%, transparent) 3px 3px 3px 0px;
      color: var(--color-primary-cta-text);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .blur-text {
      opacity: 0;
      filter: blur(8px);
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, filter 0.8s ease-out, transform 0.8s ease-out;
    }

    .blur-text.in-view {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 2rem; 
      padding: 2rem; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .cat-btn {
      background: rgba(255, 255, 255, 0.1); 
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; 
      padding: 0.5rem 1.5rem; 
      border-radius: 20px; 
      cursor: pointer; 
      transition: 0.3s;
      font-weight: bold;
      white-space: nowrap;
    }
    .cat-btn.active, .cat-btn:hover { 
      background: #FFD700; 
      color: #000; 
      border-color: #FFD700; 
    }

    .img-container {
      aspect-ratio: 1 / 1;
      height: auto;
      width: 100%;
    }

    .img-container div, .img-container img { 
      height: 100%; 
      width: 100%; 
      object-fit: cover; 
      border-radius: 8px; 
    }
    .glass-card h3 {
      text-align: center;
      width: 100%;
    }
    .card-desc {
      text-align: center;
      width: 100%;
      min-height: 2.8em;
      height: auto;
      flex-shrink: 0;
    }
    .product-price { 
      color: #3b82f6; 
      font-weight: 800; 
      font-size: 1.2rem; 
      text-align: center;
      width: 100%;
    }

    .nav-scrolled {
      background-color: rgba(0, 51, 153, 0.85) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
      .glass-card { padding: 12px; min-height: auto; }
      .card-desc { display: none; }
      h3 { font-size: 0.9rem !important; }
      .product-price { font-size: 1rem; }
      #searchInput { font-size: 0.9rem !important; }
    }
  </style>
  <link rel="stylesheet" href="mobile-fix.css?v=7">
</head>

<body class="antialiased">
  <!-- Fundo animado (Canvas simulando Webild) -->
  <div class="bg-background fixed inset-0 -z-10 w-full h-full" aria-hidden="true">
    <div style="position:relative;width:100%;height:100%;overflow:hidden;pointer-events:auto">
      <div style="width:100%;height:100%">
        <canvas id="bg-canvas" style="display:block"></canvas>
      </div>
    </div>
  </div>

  <nav class="fixed z-[1000] top-0 left-0 w-full transition-all duration-500 ease-in-out bg-background/0 backdrop-blur-0 min-h-[6rem] py-3 md:py-0 md:h-20">
    <div class="relative flex flex-col md:flex-row items-center justify-center md:justify-between h-full w-content-width mx-auto gap-3 md:gap-0">
      <div class="flex items-center transition-all duration-500 ease-in-out">
        <a href="/index.html" class="cursor-pointer">
          <img src="/logo.png" alt="Fulltime Academia" class="h-10 md:h-16 w-auto object-contain transition-transform hover:scale-105" />
        </a>
      </div>
      <div class="flex items-center justify-center gap-4 sm:gap-6 md:gap-6 transition-all duration-500 ease-in-out w-full md:w-auto overflow-x-auto pb-1 md:pb-0 px-6" role="navigation" style="scrollbar-width: none;">
        <a href="/index.html" class="relative text-sm md:text-base inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Início</a>
        <button id="checkout-btn" class="font-bold bg-white text-blue-900 px-4 py-2 rounded-lg cursor-pointer transition-transform hover:scale-105 whitespace-nowrap ml-2">Carrinho (0)</button>
      </div>
    </div>
  </nav>

  <section class="pt-40 pb-10 text-center">
    <h2 class="text-5xl font-bold mb-4 blur-text">Potencialize Seus Resultados</h2>
    <p class="opacity-70 blur-text">Suplementação premium para levar o seu treino ao próximo nível.</p>
  </section>

  <div class="flex justify-center px-4 mb-8 blur-text">
    <input type="text" id="searchInput" placeholder="Qual suplemento você procura?" class="w-full max-w-md p-4 rounded-full bg-white/5 border border-white/20 text-white outline-none placeholder:text-white/60 focus:border-white/40 transition-all">
  </div>

  <div class="categories flex justify-center gap-3 overflow-x-auto px-4 mb-10 blur-text" id="categorias-container"></div>

  <div class="grid" id="produtos-grid"></div>

  <script>
    let allProdutos = [], currentFilter = 'todos', currentSearch = '';

    async function loadStore() {
      try {
        const [resP, resC] = await Promise.all([fetch('/api/produtos'), fetch('/api/categorias')]);
        allProdutos = await resP.json();
        const categorias = await resC.json();

        const catContainer = document.getElementById('categorias-container');
        catContainer.innerHTML = `<button class="cat-btn active" data-filter="todos">Todos</button>` + 
          categorias.map(c => `<button class="cat-btn" data-filter="${c}">${c}</button>`).join('');

        catContainer.querySelectorAll('.cat-btn').forEach(btn => {
          btn.onclick = () => {
            catContainer.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderizarProdutosLoja();
          };
        });

        renderizarProdutosLoja();
      } catch (err) {
        console.error("Erro ao carregar loja:", err);
      }
    }

    function renderizarProdutosLoja() {
      const grid = document.getElementById('produtos-grid');
      const filtered = allProdutos.filter(p => {
        const matchesCat = currentFilter === 'todos' || p.categoria === currentFilter;
        const matchesSearch = p.nome.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesCat && matchesSearch;
      });

      grid.innerHTML = filtered.map(p => `
        <div class="glass-card p-3 pb-5">
          <div>
            <div class="img-container"><img src="${p.imagem}" alt="${p.nome}" class="w-full h-full object-cover" style="border-radius: 8px;"></div>
            <div class="mt-4">
              <h3 class="font-bold text-lg">${p.nome}</h3>
              <p class="card-desc text-sm opacity-60 mt-2">${p.descricao || ""}</p>
              <span class="product-price block mt-3">${p.preco}</span>
            </div>
          </div>
          <button class="primary-button w-full py-3 rounded-xl font-bold text-sm mt-4 uppercase tracking-wider" style="margin-top: auto !important;">Adicionar ao Carrinho</button>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').oninput = (e) => { currentSearch = e.target.value; renderizarProdutosLoja(); };

    document.addEventListener('DOMContentLoaded', () => {
      loadStore();
      
      const nav = document.querySelector('nav');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 20) {
          nav.classList.add('nav-scrolled');
        } else {
          nav.classList.remove('nav-scrolled');
        }
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.blur-text').forEach(el => observer.observe(el));

      // Canvas de Fundo (Simulação Webild)
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        let time = 0;
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        function animate() {
          time += 0.005;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cx = canvas.width / 2 + Math.sin(time) * (canvas.width * 0.1);
          const cy = canvas.height / 2 + Math.cos(time * 0.8) * (canvas.height * 0.1);
          const radius = Math.max(canvas.width, canvas.height) * 0.6;
          const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          gradient.addColorStop(0, 'rgba(59, 130, 246, 0.04)');
          gradient.addColorStop(1, 'rgba(0, 51, 153, 0)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          requestAnimationFrame(animate);
        }
        animate();
      }
    });
  </script>
<style>#beams-bg-container{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;overflow:hidden;background-color:var(--color-background,#003399)}#beams-canvas{position:absolute;inset:0;filter:blur(15px);opacity:0.8}body,main,.bg-background{background:transparent !important}</style><div id="beams-bg-container"><canvas id="beams-canvas"></canvas></div><script>(function(){const canvas=document.getElementById('beams-canvas');const ctx=canvas.getContext('2d');let beams=[];let lastWidth=window.innerWidth;function createBeam(width,height,isInitial=false){return{x:Math.random()*width*1.5-width*0.25,y:isInitial?Math.random()*height*2-height:height+200+Math.random()*200,width:40+Math.random()*80,length:height*3.5,angle:-35+Math.random()*10,speed:0.8+Math.random()*1.5,opacity:0.4+Math.random()*0.4,pulse:Math.random()*Math.PI*2,pulseSpeed:0.02+Math.random()*0.03};}function resetBeam(beam,width,height){beam.y=height+200+Math.random()*200;beam.x=Math.random()*width*1.5-width*0.25;return beam;}function updateSize(){const width=window.innerWidth;const height=window.innerHeight;if(Math.abs(width-lastWidth)<10&&beams.length>0)return;lastWidth=width;const dpr=window.devicePixelRatio||1;canvas.width=width*dpr;canvas.height=height*dpr;canvas.style.width=width+'px';canvas.style.height=height+'px';ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);beams=Array.from({length:45},()=>createBeam(width,height,true));}function drawBeam(beam){ctx.save();ctx.translate(beam.x,beam.y);ctx.rotate((beam.angle*Math.PI)/180);const pOpacity=Math.max(0,Math.min(1,beam.opacity*(0.8+Math.sin(beam.pulse)*0.2)));const grad=ctx.createLinearGradient(0,0,0,beam.length);grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(0.1,`rgba(0,0,0,${pOpacity*0.5})`);grad.addColorStop(0.4,`rgba(0,0,0,${pOpacity})`);grad.addColorStop(0.6,`rgba(0,0,0,${pOpacity})`);grad.addColorStop(0.9,`rgba(0,0,0,${pOpacity*0.5})`);grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fillRect(-beam.width/2,0,beam.width,beam.length);ctx.restore();}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);const w=window.innerWidth;const h=window.innerHeight;beams.forEach((beam)=>{beam.y-=beam.speed;beam.pulse+=beam.pulseSpeed;if(beam.y+beam.length<-200){resetBeam(beam,w,h);}drawBeam(beam);});requestAnimationFrame(animate);}updateSize();window.addEventListener('resize',updateSize);animate();})();</script>
</body>
</html>
