<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charSet="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Loja | Fulltime Academia</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--color-background)',
            foreground: 'var(--color-foreground)',
            card: 'var(--color-card)',
            accent: 'var(--color-accent)',
          },
          width: { 'content-width': 'clamp(40rem, 75vw, 100rem)' },
          borderRadius: { 'theme': '1rem' }
        }
      }
    }
  </script>

  <style>
    :root {
      --color-background: #003399;
      --color-foreground: #fafafa;
      --color-card: rgba(45, 45, 45, 0.6);
      --color-accent: #3b82f6;
    }

    body { font-family: 'Inter Tight', sans-serif; background-color: var(--color-background); color: var(--color-foreground); overflow-x: hidden; }
    
    .glass-card {
      background: var(--color-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between;
      transition: 0.3s; height: 100%;
    }
    .glass-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.3); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    
    .cat-btn {
      background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; padding: 0.5rem 1.5rem; border-radius: 20px; cursor: pointer; transition: 0.3s;
    }
    .cat-btn.active, .cat-btn:hover { background: #FFD700; color: #000; border-color: #FFD700; }

    .img-container img { height: 180px; width: 100%; object-fit: cover; border-radius: 8px; }
    .product-price { color: #3b82f6; font-weight: 800; font-size: 1.2rem; }
    
    /* Mobile styles incorporated from mobile-fix.css or similar */
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
      .glass-card { padding: 12px; min-height: auto; }
      .img-container img { height: 100px; }
      .card-desc { display: none; }
      h3 { font-size: 0.9rem !important; }
      .product-price { font-size: 1rem; }
    }
  </style>
  <link rel="stylesheet" href="mobile-fix.css">
</head>

<body class="antialiased">
  <canvas id="bg-canvas" style="position:fixed; inset:0; z-index:-1;"></canvas>

  <nav class="fixed top-0 w-full h-20 z-[1000] bg-background/80 backdrop-blur-md border-bottom border-white/5">
    <div class="flex items-center justify-between h-full max-w-7xl mx-auto px-6">
      <a href="index.html"><img src="/logo.png" class="h-12 w-auto" /></a>
      <div class="flex gap-6">
        <a href="index.html">Início</a>
        <button id="checkout-btn" class="font-bold">Carrinho (0)</button>
      </div>
    </div>
  </nav>

  <section class="pt-32 pb-10 text-center">
    <h2 class="text-5xl font-bold mb-4">Loja de Suplementos</h2>
    <p class="opacity-70">Potencialize seus resultados com o que há de melhor.</p>
  </section>

  <div class="flex justify-center px-4 mb-8">
    <input type="text" id="searchInput" placeholder="O que você procura?" class="w-full max-w-md p-3 rounded-full bg-white/5 border border-white/20 text-white outline-none">
  </div>

  <div class="categories flex justify-center gap-3 overflow-x-auto px-4 mb-10" id="categorias-container"></div>

  <div class="grid" id="produtos-grid"></div>

  <script>
    let allProdutos = [], currentFilter = 'todos', currentSearch = '';

    async function loadStore() {
      const [resP, resC] = await Promise.all([fetch('/api/produtos'), fetch('/api/categorias')]);
      allProdutos = await resP.json();
      const categorias = await resC.json();

      const catContainer = document.getElementById('categorias-container');
      catContainer.innerHTML = `<button class="cat-btn active" data-filter="todos">Todos</button>` + 
        categorias.map(c => `<button class="cat-btn" data-filter="${c}">${c}</button>`).join('');

      catContainer.querySelectorAll('.cat-btn').forEach(btn => {
        btn.onclick = () => {
          catContainer.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          render();
        };
      });

      render();
    }

    function render() {
      const grid = document.getElementById('produtos-grid');
      const filtered = allProdutos.filter(p => {
        const matchesCat = currentFilter === 'todos' || p.categoria === currentFilter;
        const matchesSearch = p.nome.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesCat && matchesSearch;
      });

      grid.innerHTML = filtered.map(p => `
        <div class="glass-card">
          <div class="img-container"><img src="${p.imagem}" alt="${p.nome}"></div>
          <div class="mt-4">
            <h3 class="font-bold text-lg">${p.nome}</h3>
            <p class="card-desc text-sm opacity-60 mt-2">${p.descricao || ""}</p>
            <div class="flex items-center justify-between mt-4">
              <span class="product-price">${p.preco}</span>
              <button class="bg-white text-blue-900 px-4 py-2 rounded-lg font-bold text-sm">Adicionar</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').oninput = (e) => { currentSearch = e.target.value; render(); };

    document.addEventListener('DOMContentLoaded', loadStore);

    // BG Animation
    const c = document.getElementById('bg-canvas'); const ctx = c.getContext('2d');
    function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
    window.onresize = res; res();
    function anim() {
      ctx.clearRect(0,0,c.width,c.height);
      const g = ctx.createRadialGradient(c.width/2, c.height/2, 0, c.width/2, c.height/2, Math.max(c.width,c.height));
      g.addColorStop(0, 'rgba(59, 130, 246, 0.05)'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
      requestAnimationFrame(anim);
    } anim();
  </script>
</body>
</html>
