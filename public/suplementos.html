<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">

<head>
  <meta charSet="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Loja | Fulltime Academia</title>
  
  <!-- Fonte Original -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--color-background)',
            foreground: 'var(--color-foreground)',
            card: 'var(--color-card)',
            border: 'var(--color-border)',
            accent: 'var(--color-accent)',
            'primary-cta': 'var(--color-primary-cta)',
            'primary-cta-text': 'var(--color-primary-cta-text)',
            'secondary-cta': 'var(--color-secondary-cta)',
            'secondary-cta-text': 'var(--color-secondary-cta-text)',
          },
          width: {
            'content-width': 'var(--width-content-width)',
          },
          borderRadius: {
            'theme': 'var(--theme-border-radius)',
            'theme-capped': 'var(--theme-border-radius-capped)',
          },
          padding: {
            'hero-page-padding': '8rem',
          },
          spacing: {
            '15': '3.75rem',
            '90': '22.5rem',
            '100': '25rem',
            '4/10': '40%',
            '6/10': '60%',
            '3/10': '30%',
            '7/10': '70%',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      /* Cores e variáveis exatas da plataforma */
      --color-background: #003399;
      --color-foreground: #fafafa;
      --color-card: #383838;
      --color-border: #484848;
      --color-accent: #3b82f6;
      --color-background-accent: #1f2937;
      --color-primary-cta: #fafafa;
      --color-primary-cta-text: #09090b;
      --color-secondary-cta: #27272a;
      --color-secondary-cta-text: #fafafa;

      --radius-lg: 1rem;
      --theme-border-radius: var(--radius-lg);
      --theme-border-radius-capped: var(--radius-lg);
      --width-content-width: clamp(40rem, 75vw, 100rem);
      --width-content-width-expanded: clamp(calc(40rem - (40rem - 100vw) / 2), 87.5vw, calc(100rem + (100vw - 100rem) / 2));
      --vw: clamp(0.5rem, 0.92vw, 1rem);

      --text-base: clamp(0.875rem, 1.058vw, 1rem);
      --width-10: 2.5rem;
      --width-5: 1.25rem;
      --width-17_5: 4.375rem;
      --vw-0_75: 0.75rem;
    }

    @media (max-width: 768px) {
      :root {
        --width-content-width: 85vw;
        --width-content-width-expanded: 90vw;
      }
    }

    html {
      scroll-behavior: smooth !important;
    }

    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--color-background);
      color: var(--color-foreground);
      overflow-x: hidden;
      font-kerning: none;
      text-rendering: optimizeSpeed;
    }

    h2 {
      font-size: 2.5rem !important;
      line-height: 1.3 !important;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.75rem !important;
      line-height: 1.3 !important;
    }

    .glass-card {
      position: relative;
      background-color: rgba(45, 45, 45, 0.6) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 1.5rem; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start;
      align-items: center;
      transition: transform 0.3s ease, border-color 0.3s ease; 
      height: 100%;
      min-height: 460px;
      gap: 0.5rem;
    }
    .glass-card:hover { 
      transform: translateY(-5px); 
      border-color: rgba(255, 255, 255, 0.3) !important; 
    }

    .primary-button {
      background-color: var(--color-primary-cta);
      background: linear-gradient(to bottom, color-mix(in srgb, var(--color-primary-cta), transparent 25%), var(--color-primary-cta));
      box-shadow: color-mix(in srgb, var(--color-background) 25%, transparent) 0px 1px 1px 0px inset, color-mix(in srgb, var(--color-primary-cta) 15%, transparent) 3px 3px 3px 0px;
      color: var(--color-primary-cta-text);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .blur-text {
      opacity: 0;
      filter: blur(8px);
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, filter 0.8s ease-out, transform 0.8s ease-out;
    }

    .blur-text.in-view {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 2rem; 
      padding: 2rem; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .cat-btn {
      background: rgba(255, 255, 255, 0.1); 
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; 
      padding: 0.5rem 1.5rem; 
      border-radius: 20px; 
      cursor: pointer; 
      transition: 0.3s;
      font-weight: bold;
      white-space: nowrap;
    }
    .cat-btn.active, .cat-btn:hover { 
      background: #FFD700; 
      color: #000; 
      border-color: #FFD700; 
    }

    .img-container {
      aspect-ratio: 1 / 1;
      height: auto;
      width: 100%;
    }

    .img-container div, .img-container img { 
      height: 100%; 
      width: 100%; 
      object-fit: cover; 
      border-radius: 8px; 
    }
    .glass-card h3 {
      text-align: center;
      width: 100%;
    }
    .card-desc {
      text-align: center;
      width: 100%;
      min-height: 2.8em;
      height: auto;
      flex-shrink: 0;
    }
    .product-price { 
      color: #3b82f6; 
      font-weight: 800; 
      font-size: 1.2rem; 
      text-align: center;
      width: 100%;
    }

    .nav-scrolled {
      background-color: rgba(0, 51, 153, 0.85) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    #cart-sidebar {
      position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
      background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
      box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 2000;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; padding: 2rem; border-left: 1px solid rgba(255,255,255,0.1);
    }
    #cart-sidebar.open { right: 0; }
    
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
      .glass-card { padding: 12px; min-height: auto; }
      h3 { font-size: 0.9rem !important; }
      .product-price { font-size: 1rem; }
      #searchInput { font-size: 0.9rem !important; }
      #cart-sidebar { width: 100%; right: -100%; }
    }
  </style>
  <link rel="stylesheet" href="mobile-fix.css?v=7">
</head>

<body class="antialiased">
  <!-- Fundo animado (Canvas simulando Webild) -->
  <div class="bg-background fixed inset-0 -z-10 w-full h-full" aria-hidden="true">
    <div style="position:relative;width:100%;height:100%;overflow:hidden;pointer-events:auto">
      <div style="width:100%;height:100%">
        <canvas id="bg-canvas" style="display:block"></canvas>
      </div>
    </div>
  </div>

  <nav class="fixed z-[1000] top-0 left-0 w-full transition-all duration-500 ease-in-out bg-background/0 backdrop-blur-0 md:h-20">
    <div class="relative flex flex-col items-center md:flex-row md:justify-between w-full md:max-w-7xl mx-auto px-8 md:px-8 py-6 md:py-0 h-full">
      <a href="/index.html" class="cursor-pointer mb-4 md:mb-0 flex-shrink-0">
        <img src="/logo.png" alt="Fulltime Academia" class="w-14 md:w-16 h-auto object-contain transition-transform hover:scale-105" />
      </a>
      <div class="w-full md:w-auto flex flex-row justify-between items-center md:gap-8" role="navigation">
        <div class="flex flex-row flex-wrap gap-3 md:gap-6 items-center text-sm md:text-base">
          <a href="index.html" class="relative inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Início</a>
          <a href="index.html#sobre" class="relative inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Sobre</a>
          <a href="index.html#unidades" class="relative inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Unidades</a>
          <a href="index.html#contato" class="relative inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Contato</a>
          <a href="suplementos.html" class="relative inline-block bg-transparent border-none p-0 cursor-pointer text-foreground whitespace-nowrap hover:text-accent transition-colors">Loja</a>
        </div>
        <button id="checkout-btn" class="relative p-2 text-foreground hover:text-accent transition-colors" onclick="toggleCart()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
          <span id="cart-badge" class="absolute top-0 right-0 bg-blue-500 text-white rounded-full text-[10px] font-bold w-4 h-4 flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Sidebar do Carrinho -->
  <div id="cart-sidebar">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-xl font-medium text-balance">Seu Carrinho</h2>
      <button onclick="toggleCart()" class="text-white opacity-50 hover:opacity-100">✕</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto"></div>
    <div class="mt-8 pt-6 border-t border-white/10">
      <div class="flex justify-between items-center mb-6">
        <span class="text-lg opacity-60">Total</span>
        <span id="cart-total" class="text-2xl font-bold text-blue-400">R$ 0,00</span>
      </div>
      <button id="finish-btn" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:scale-[1.02] transition-transform active:scale-95" onclick="checkout()">Finalizar Compra</button>
    </div>
  </div>

  <section class="pt-40 pb-10 text-center">
    <h2 class="blur-text text-center text-6xl font-medium text-balance mb-4">Potencialize Seus Resultados</h2>
    <p class="text-sm md:text-base font-medium text-gray-300 mt-4 mb-6 blur-text">Suplementação premium para levar o seu treino ao próximo nível.</p>
  </section>

  <div class="flex justify-center px-6 mb-8 blur-text">
    <input type="text" id="searchInput" placeholder="Qual suplemento você procura?" class="w-full md:max-w-2xl p-4 rounded-full bg-white/5 border border-white/20 text-white outline-none placeholder:text-white/60 focus:border-white/40 transition-all">
  </div>

  <div class="categories flex justify-center gap-3 overflow-x-auto px-4 mb-10 blur-text" id="categorias-container"></div>

  <div class="grid" id="produtos-grid"></div>

  <script>
    let allProdutos = [], currentFilter = 'todos', currentSearch = '';
    localStorage.removeItem('fulltime_cart');
    let cart = JSON.parse(localStorage.getItem('fulltime_cart') || '[]');

    async function loadStore() {
      try {
        const [resP, resC] = await Promise.all([fetch('/api/produtos'), fetch('/api/categorias')]);
        allProdutos = await resP.json();
        const categorias = await resC.json();

        const catContainer = document.getElementById('categorias-container');
        catContainer.innerHTML = `<button class="cat-btn active" data-filter="todos">Todos</button>` + 
          categorias.map(c => `<button class="cat-btn" data-filter="${c}">${c}</button>`).join('');

        catContainer.querySelectorAll('.cat-btn').forEach(btn => {
          btn.onclick = () => {
            catContainer.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderizarProdutosLoja();
          };
        });

        renderizarProdutosLoja();
      } catch (err) {
        console.error("Erro ao carregar loja:", err);
      }
    }

    function renderizarProdutosLoja() {
      const grid = document.getElementById('produtos-grid');
      const filtered = allProdutos.filter(p => {
        const matchesCat = currentFilter === 'todos' || p.categoria === currentFilter;
        const matchesSearch = p.nome.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesCat && matchesSearch;
      });

      grid.innerHTML = filtered.map(p => `
        <div class="glass-card card-produto overflow-hidden !p-0">
          <div class="img-container w-full aspect-square">
            <img src="${p.imagem}" alt="${p.nome}" class="w-full h-full object-cover rounded-t-2xl">
          </div>
          <div class="p-4 flex flex-col flex-1">
            <h3 class="font-bold text-lg">${p.nome}</h3>
            <p class="card-desc text-sm text-gray-400 mt-1">${p.descricao || ""}</p>
            <span class="product-price block mt-3">${p.preco}</span>
            <button class="primary-button w-full py-3 rounded-xl font-bold text-xs md:text-sm px-2 mt-6 uppercase tracking-wider" onclick="addToCart('${p.id}', '${p.nome}', '${p.preco}')" style="margin-top: auto !important;">
              <span class="flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/><line x1="19" y1="2" x2="19" y2="8"/><line x1="16" y1="5" x2="22" y2="5"/></svg>
                Carrinho
              </span>
            </button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').oninput = (e) => { currentSearch = e.target.value; renderizarProdutosLoja(); };

    // Funções do Carrinho
    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function addToCart(id, name, price) {
      const btn = event.currentTarget;
      const card = btn.closest(".card-produto");
      const imagem = card.querySelector("img").src;

      const existing = cart.find(item => item.name === name);
      if (existing) {
        existing.quantidade++;
      } else {
        cart.push({ id, name, price, imagem, quantidade: 1 });
      }
      updateCart();
      
      // Feedback Visual
      const originalText = btn.innerText;
      btn.innerText = "Adicionado!";
      btn.classList.add('bg-green-600');
      btn.style.background = 'none';
      btn.style.backgroundColor = '#16a34a';

      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.remove('bg-green-600');
        btn.style.background = '';
        btn.style.backgroundColor = '';
      }, 2000);
    }

    function changeQuantity(index, delta) {
      cart[index].quantidade += delta;
      if (cart[index].quantidade <= 0) {
        cart.splice(index, 1);
      }
      updateCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function updateCart() {
      localStorage.setItem('fulltime_cart', JSON.stringify(cart));
      const totalItems = cart.reduce((sum, item) => sum + (item.quantidade || 1), 0);
      document.getElementById('cart-badge').innerText = totalItems;
      
      const itemsContainer = document.getElementById('cart-items');
      itemsContainer.innerHTML = cart.map((item, index) => {
        console.log(item.imagem);
        const itemPrice = parseFloat(item.price.replace('R$', '').replace('.', '').replace(',', '.'));
        const subtotal = itemPrice * (item.quantidade || 1);
        
        return `
          <div class="cart-item flex gap-4 py-4 border-b border-white/10">
            <img src="${item.imagem}" alt="${item.name}" class="w-12 h-12 object-cover rounded-md flex-shrink-0">
            <div class="flex flex-col gap-2 flex-1">
              <div class="flex justify-between items-start w-full">
                <div class="font-bold text-white text-sm line-clamp-1">${item.name}</div>
                <button onclick="removeFromCart(${index})" class="text-red-400 text-[10px] uppercase tracking-wider hover:text-red-300 ml-2">Remover</button>
              </div>
              <div class="flex justify-between items-center w-full">
                <div class="flex items-center bg-white/5 rounded-lg border border-white/10 p-1">
                  <button onclick="changeQuantity(${index}, -1)" class="w-6 h-6 flex items-center justify-center hover:bg-white/10 rounded">-</button>
                  <span class="mx-3 text-sm font-medium">${item.quantidade || 1}</span>
                  <button onclick="changeQuantity(${index}, 1)" class="w-6 h-6 flex items-center justify-center hover:bg-white/10 rounded">+</button>
                </div>
                <div class="text-blue-400 font-bold text-sm">R$ ${subtotal.toFixed(2).replace('.', ',')}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      const total = cart.reduce((sum, item) => {
        const itemPrice = parseFloat(item.price.replace('R$', '').replace('.', '').replace(',', '.'));
        return sum + (itemPrice * (item.quantidade || 1));
      }, 0);
      document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    async function checkout() {
      if (cart.length === 0) return alert('Carrinho vazio!');
      
      const btn = document.getElementById('finish-btn');
      btn.innerText = "Processando...";
      btn.disabled = true;

      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cart })
        });
        const { url } = await res.json();
        window.location.href = url;
      } catch (err) {
        alert('Erro ao processar pagamento.');
        btn.innerText = "Finalizar Compra";
        btn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadStore();
      updateCart();
      
      const nav = document.querySelector('nav');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 20) {
          nav.classList.add('nav-scrolled');
        } else {
          nav.classList.remove('nav-scrolled');
        }
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.blur-text').forEach(el => observer.observe(el));

      // Canvas de Fundo (Simulação Webild)
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        let time = 0;
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        function animate() {
          time += 0.005;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cx = canvas.width / 2 + Math.sin(time) * (canvas.width * 0.1);
          const cy = canvas.height / 2 + Math.cos(time * 0.8) * (canvas.height * 0.1);
          const radius = Math.max(canvas.width, canvas.height) * 0.6;
          const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          gradient.addColorStop(0, 'rgba(59, 130, 246, 0.04)');
          gradient.addColorStop(1, 'rgba(0, 51, 153, 0)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          requestAnimationFrame(animate);
        }
        animate();
      }
    });
  </script>
<style>#beams-bg-container{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;overflow:hidden;background-color:var(--color-background,#003399)}#beams-canvas{position:absolute;inset:0;filter:blur(15px);opacity:0.8}body,main,.bg-background{background:transparent !important}</style><div id="beams-bg-container"><canvas id="beams-canvas"></canvas></div><script>(function(){const canvas=document.getElementById('beams-canvas');const ctx=canvas.getContext('2d');let beams=[];let lastWidth=window.innerWidth;function createBeam(width,height,isInitial=false){return{x:Math.random()*width*1.5-width*0.25,y:isInitial?Math.random()*height*2-height:height+200+Math.random()*200,width:40+Math.random()*80,length:height*3.5,angle:-35+Math.random()*10,speed:0.8+Math.random()*1.5,opacity:0.4+Math.random()*0.4,pulse:Math.random()*Math.PI*2,pulseSpeed:0.02+Math.random()*0.03};}function resetBeam(beam,width,height){beam.y=height+200+Math.random()*200;beam.x=Math.random()*width*1.5-width*0.25;return beam;}function updateSize(){const width=window.innerWidth;const height=window.innerHeight;if(Math.abs(width-lastWidth)<10&&beams.length>0)return;lastWidth=width;const dpr=window.devicePixelRatio||1;canvas.width=width*dpr;canvas.height=height*dpr;canvas.style.width=width+'px';canvas.style.height=height+'px';ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);beams=Array.from({length:45},()=>createBeam(width,height,true));}function drawBeam(beam){ctx.save();ctx.translate(beam.x,beam.y);ctx.rotate((beam.angle*Math.PI)/180);const pOpacity=Math.max(0,Math.min(1,beam.opacity*(0.8+Math.sin(beam.pulse)*0.2)));const grad=ctx.createLinearGradient(0,0,0,beam.length);grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(0.1,`rgba(0,0,0,${pOpacity*0.5})`);grad.addColorStop(0.4,`rgba(0,0,0,${pOpacity})`);grad.addColorStop(0.6,`rgba(0,0,0,${pOpacity})`);grad.addColorStop(0.9,`rgba(0,0,0,${pOpacity*0.5})`);grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fillRect(-beam.width/2,0,beam.width,beam.length);ctx.restore();}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);const w=window.innerWidth;const h=window.innerHeight;beams.forEach((beam)=>{beam.y-=beam.speed;beam.pulse+=beam.pulseSpeed;if(beam.y+beam.length<-200){resetBeam(beam,w,h);}drawBeam(beam);});requestAnimationFrame(animate);}updateSize();window.addEventListener('resize',updateSize);animate();})();</script>
