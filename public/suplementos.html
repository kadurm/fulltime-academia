<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charSet="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Loja | Fulltime Academia</title>
  <meta name="description"
    content="Transforme seu corpo na Fulltime Academia. Equipamentos premium, reconhecimento facial e unidades climatizadas em Montes Claros." />

  <!-- Fonte Original -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--color-background)',
            foreground: 'var(--color-foreground)',
            card: 'var(--color-card)',
            border: 'var(--color-border)',
            accent: 'var(--color-accent)',
            'primary-cta': 'var(--color-primary-cta)',
            'primary-cta-text': 'var(--color-primary-cta-text)',
            'secondary-cta': 'var(--color-secondary-cta)',
            'secondary-cta-text': 'var(--color-secondary-cta-text)',
          },
          width: {
            'content-width': 'var(--width-content-width)',
          },
          borderRadius: {
            'theme': 'var(--theme-border-radius)',
            'theme-capped': 'var(--theme-border-radius-capped)',
          },
          padding: {
            'hero-page-padding': '8rem',
          },
          spacing: {
            '15': '3.75rem',
            '90': '22.5rem',
            '100': '25rem',
            '4/10': '40%',
            '6/10': '60%',
            '3/10': '30%',
            '7/10': '70%',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      /* Cores e variáveis exatas da plataforma */
      --color-background: #003399;
      --color-foreground: #fafafa;
      --color-card: #383838;
      --color-border: #484848;
      --color-accent: #3b82f6;
      --color-background-accent: #1f2937;
      --color-primary-cta: #fafafa;
      --color-primary-cta-text: #09090b;
      --color-secondary-cta: #27272a;
      --color-secondary-cta-text: #fafafa;

      --radius-lg: 1rem;
      --theme-border-radius: var(--radius-lg);
      --theme-border-radius-capped: var(--radius-lg);
      --width-content-width: clamp(40rem, 75vw, 100rem);
      --width-content-width-expanded: clamp(calc(40rem - (40rem - 100vw) / 2), 87.5vw, calc(100rem + (100vw - 100rem) / 2));
      --vw: clamp(0.5rem, 0.92vw, 1rem);

      --text-base: clamp(0.875rem, 1.058vw, 1rem);
      --width-10: 2.5rem;
      --width-5: 1.25rem;
      --width-17_5: 4.375rem;
      --vw-0_75: 0.75rem;
    }

    @media (max-width: 768px) {
      :root {
        --width-content-width: 85vw;
        --width-content-width-expanded: 90vw;
      }
      #hero h2 {
        font-size: 2.5rem !important;
        line-height: 1.1;
      }
      h2 {
        font-size: 1.75rem !important;
      }
      h3 {
        font-size: 1.25rem !important;
      }
      .section-subtitle {
        font-size: 1rem !important;
      }
    }

    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--color-background);
      color: var(--color-foreground);
      overflow-x: hidden;
      font-kerning: none;
      text-rendering: optimizeSpeed;
    }

    h1, h2, h3, .section-subtitle, .blur-text {
      text-align: center !important;
    }

    h2 {
      font-size: 2.5rem !important;
      line-height: 1.3 !important;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.75rem !important;
      line-height: 1.3 !important;
    }

    .section-subtitle {
      font-size: 1.125rem !important;
      line-height: 1.6 !important;
      margin-bottom: 2rem;
      display: block;
    }

    /* Estilos UI da Plataforma c/ Glassmorphism */
    .card, .glass-card {
      position: relative;
      background-color: rgba(45, 45, 45, 0.6) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      
      /* Padronização de Tamanho */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 420px;
      width: 100%;
      max-width: 280px;
      flex: 0 0 280px;
      margin: 0 auto;
    }

    .glass-card:hover {
      transform: translateY(-10px);
      border-color: rgba(255, 255, 255, 0.3) !important;
      box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.5);
    }

    .primary-button, .btn {
      background-color: var(--color-primary-cta);
      background: linear-gradient(to bottom, color-mix(in srgb, var(--color-primary-cta), transparent 25%), var(--color-primary-cta));
      box-shadow: color-mix(in srgb, var(--color-background) 25%, transparent) 0px 1px 1px 0px inset, color-mix(in srgb, var(--color-primary-cta) 15%, transparent) 3px 3px 3px 0px;
      color: var(--color-primary-cta-text);
      cursor: pointer;
      transition: all 0.3s;
    }

    .primary-button:hover, .btn:hover {
      filter: brightness(0.9);
    }

    /* Grade de Produtos Refinada */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      justify-content: center;
      gap: 2rem;
      padding: 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Categorias */
    .categories {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .cat-btn.active, .cat-btn:hover {
      background: #FFD700;
      color: #000;
      border-color: #FFD700;
    }

    .img-container {
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 180px;
      width: 100%;
    }

    .img-container div, .img-container img {
      height: 180px;
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #FFD700;
      color: #000;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 5;
    }

    /* Tipografia dos Cards */
    .glass-card h3 {
      font-size: 0.95rem;
      line-height: 1.4;
      height: 2.6em;
      margin: 0.75rem 0 0.25rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center !important;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.4;
      height: 2.8em;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .product-price {
      font-weight: 800;
      color: #3b82f6; /* Accent color for price */
      margin-bottom: 1rem;
      text-align: center;
    }

    /* --- ESTILOS DO CARRINHO (DRAWER) --- */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .cart-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 380px;
      height: 100vh;
      background: rgba(25, 25, 25, 0.85);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 2rem;
      box-sizing: border-box;
      color: #fff;
    }

    .cart-drawer.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 1rem;
    }

    .close-cart {
      cursor: pointer;
      font-size: 1.5rem;
      background: none;
      border: none;
      color: #fff;
    }

    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 8px;
    }

    .cart-item-info h4 {
      margin: 0 0 0.5rem 0;
      font-size: 0.9rem;
      text-align: left !important;
    }

    .cart-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cart-controls button {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-controls button:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

  <!-- Script Integrado e Carrinho -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Navbar no Scroll
      const nav = document.querySelector('nav');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 20) {
          nav.classList.add('nav-scrolled');
        } else {
          nav.classList.remove('nav-scrolled');
        }
      });

      // 2. Mobile Menu Toggle
      const menuToggle = document.getElementById('menu-toggle');
      const menuClose = document.getElementById('menu-close');
      const mobileMenu = document.getElementById('mobile-menu');

      function toggleMenu() {
        const isOpen = mobileMenu.classList.contains('opacity-100');
        if (!isOpen) {
          mobileMenu.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-10px]');
          mobileMenu.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
        } else {
          mobileMenu.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-10px]');
          mobileMenu.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
        }
      }

      menuToggle?.addEventListener('click', toggleMenu);
      menuClose?.addEventListener('click', toggleMenu);

      // 3. Animação de entrada
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.blur-text').forEach(el => observer.observe(el));

      // --- LOGICA DO CARRINHO (DRAWER) ---
      let cart = [];
      const checkoutBtn = document.getElementById('checkout-btn');
      const cartDrawer = document.getElementById('cartDrawer');
      const cartOverlay = document.getElementById('cartOverlay');
      const closeCartBtn = document.getElementById('closeCartBtn');
      const cartItemsContainer = document.getElementById('cartItemsContainer');
      const cartTotalDisplay = document.getElementById('cartTotalDisplay');
      const checkoutBtnModal = document.getElementById('checkoutBtnModal');

      const openCart = () => {
        cartDrawer.classList.add('open');
        cartOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      };

      const closeCart = () => {
        cartDrawer.classList.remove('open');
        cartOverlay.classList.remove('active');
        document.body.style.overflow = '';
      };

      const renderCart = () => {
        cartItemsContainer.innerHTML = '';
        let total = 0;
        let totalItems = 0;

        cart.forEach((item, index) => {
          const itemPrice = parseFloat(item.price.replace('R$', '').replace(',', '.'));
          total += itemPrice * item.quantity;
          totalItems += item.quantity;

          const itemEl = document.createElement('div');
          itemEl.className = 'cart-item';
          itemEl.innerHTML = `
            <div class="cart-item-info">
              <h4 class="font-medium">${item.name}</h4>
              <span class="text-sm opacity-70">${item.price}</span>
            </div>
            <div class="cart-controls">
              <button onclick="window.updateQty(${index}, -1)">-</button>
              <span>${item.quantity}</span>
              <button onclick="window.updateQty(${index}, 1)">+</button>
            </div>
          `;
          cartItemsContainer.appendChild(itemEl);
        });

        cartTotalDisplay.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        checkoutBtn.innerText = `🛒 Carrinho (${totalItems})`;
      };

      window.updateQty = (index, change) => {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
          cart.splice(index, 1);
        }
        renderCart();
      };

      // --- LOGICA DE PRODUTOS DINÂMICOS ---
      async function carregarProdutosLoja() {
        const grid = document.getElementById('produtos-grid');
        grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1 / -1;">Carregando suplementos...</p>';
        
        try {
          const response = await fetch('/api/produtos');
          const produtos = await response.json();
          
          if (produtos.length === 0) {
            grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1 / -1;">Nenhum produto disponível no momento.</p>';
            return;
          }

          renderizarProdutosLoja(produtos);
        } catch (error) {
          console.error('Erro ao carregar produtos:', error);
          grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1 / -1;">Erro ao carregar produtos.</p>';
        }
      }

      function renderizarProdutosLoja(produtos) {
        const grid = document.getElementById('produtos-grid');
        grid.innerHTML = produtos.map(p => `
          <div class="glass-card card p-6 blur-text in-view" data-category="${(p.nome.toLowerCase().includes('whey') || p.nome.toLowerCase().includes('proteina')) ? 'proteina' : (p.nome.toLowerCase().includes('creatina') ? 'creatina' : (p.nome.toLowerCase().includes('pré') || p.nome.toLowerCase().includes('pre') ? 'pre' : 'todos'))}">
            <div class="img-container">
              <img src="${p.imagem}" alt="${p.nome}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px;">
            </div>
            <h3 class="product-name">${p.nome}</h3>
            <p class="card-desc">Suplemento de alta qualidade para potencializar seus resultados.</p>
            <p class="product-price">${p.preco}</p>
            <button class="add-to-cart primary-button h-10 w-full rounded-theme text-sm font-bold">Adicionar ao Carrinho</button>
          </div>
        `).join('');

        configurarFiltros();
        configurarBotoesCarrinho();
      }

      function configurarFiltros() {
        const catBtns = document.querySelectorAll('.cat-btn');
        const productCards = document.querySelectorAll('.glass-card');

        catBtns.forEach(btn => {
          btn.onclick = () => {
            catBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filter = btn.getAttribute('data-filter');

            productCards.forEach(card => {
              const category = card.getAttribute('data-category');
              if (filter === 'todos' || category === filter) {
                card.style.display = 'flex';
              } else {
                card.style.display = 'none';
              }
            });
          };
        });
      }

      function configurarBotoesCarrinho() {
        document.querySelectorAll('.add-to-cart').forEach(button => {
          button.onclick = () => {
            const card = button.closest('.card');
            const name = card.querySelector('.product-name').innerText;
            const price = card.querySelector('.product-price').innerText;

            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
              existingItem.quantity++;
            } else {
              cart.push({ name, price, quantity: 1 });
            }

            renderCart();
            openCart();
            
            const originalText = button.innerText;
            button.innerText = 'Adicionado!';
            button.style.background = '#4BB543';
            setTimeout(() => {
              button.innerText = originalText;
              button.style.background = '';
            }, 1000);
          };
        });
      }

      // 4. Canvas de Fundo
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        let time = 0;
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        function animate() {
          time += 0.005;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cx = canvas.width / 2 + Math.sin(time) * (canvas.width * 0.1);
          const cy = canvas.height / 2 + Math.cos(time * 0.8) * (canvas.height * 0.1);
          const radius = Math.max(canvas.width, canvas.height) * 0.6;
          const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          gradient.addColorStop(0, 'rgba(59, 130, 246, 0.04)');
          gradient.addColorStop(1, 'rgba(0, 51, 153, 0)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          requestAnimationFrame(animate);
        }
        animate();
      }

      carregarProdutosLoja();

      checkoutBtn.addEventListener('click', openCart);
      closeCartBtn.addEventListener('click', closeCart);
      cartOverlay.addEventListener('click', closeCart);

      checkoutBtnModal.addEventListener('click', async () => {
        if (cart.length === 0) {
          alert('Seu carrinho está vazio!');
          return;
        }

        checkoutBtnModal.innerText = 'Processando...';
        checkoutBtnModal.disabled = true;

        try {
          const response = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart })
          });

          const data = await response.json();
          if (data.url) {
            window.location.href = data.url;
          } else {
            throw new Error(data.error || 'Erro ao criar sessão de checkout');
          }
        } catch (error) {
          console.error('Erro:', error);
          alert('Erro ao finalizar compra. Tente novamente.');
          checkoutBtnModal.innerText = 'Finalizar Compra';
          checkoutBtnModal.disabled = false;
        }
      });
    });
  </script>

  <!-- Beams Background -->
  <style>#beams-bg-container{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;overflow:hidden;background-color:var(--color-background,#003399)}#beams-canvas{position:absolute;inset:0;filter:blur(15px);opacity:0.8}body,main,.bg-background{background:transparent !important}</style>
  <div id="beams-bg-container"><canvas id="beams-canvas"></canvas></div>
  <script>
    (function(){
      const canvas=document.getElementById('beams-canvas');
      const ctx=canvas.getContext('2d');
      let beams=[];
      let lastWidth=window.innerWidth;
      function createBeam(width,height,isInitial=false){
        return{x:Math.random()*width*1.5-width*0.25,y:isInitial?Math.random()*height*2-height:height+200+Math.random()*200,width:40+Math.random()*80,length:height*3.5,angle:-35+Math.random()*10,speed:0.8+Math.random()*1.5,opacity:0.4+Math.random()*0.4,pulse:Math.random()*Math.PI*2,pulseSpeed:0.02+Math.random()*0.03};
      }
      function updateSize(){
        const width=window.innerWidth;
        const height=window.innerHeight;
        const dpr=window.devicePixelRatio||1;
        canvas.width=width*dpr;
        canvas.height=height*dpr;
        canvas.style.width=width+'px';
        canvas.style.height=height+'px';
        ctx.scale(dpr,dpr);
        beams=Array.from({length:45},()=>createBeam(width,height,true));
      }
      function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        beams.forEach(beam=>{
          beam.y-=beam.speed;
          beam.pulse+=beam.pulseSpeed;
          if(beam.y+beam.length<0) {
            beam.y=window.innerHeight+200;
            beam.x=Math.random()*window.innerWidth*1.5-window.innerWidth*0.25;
          }
          ctx.save();
          ctx.translate(beam.x,beam.y);
          ctx.rotate((beam.angle*Math.PI)/180);
          const pOpacity=Math.max(0,Math.min(1,beam.opacity*(0.8+Math.sin(beam.pulse)*0.2)));
          const grad=ctx.createLinearGradient(0,0,0,beam.length);
          grad.addColorStop(0,'rgba(0,0,0,0)');
          grad.addColorStop(0.5,`rgba(0,0,0,${pOpacity})`);
          grad.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=grad;
          ctx.fillRect(-beam.width/2,0,beam.width,beam.length);
          ctx.restore();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize',updateSize);
      updateSize();
      draw();
    })();
  </script>
