<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charSet="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gestão | KrM Corp</title>

  <!-- Fonte Global -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--color-background)',
            foreground: 'var(--color-foreground)',
            card: 'var(--color-card)',
            border: 'var(--color-border)',
            accent: 'var(--color-accent)',
            'primary-cta': 'var(--color-primary-cta)',
            'primary-cta-text': 'var(--color-primary-cta-text)',
            'secondary-cta': 'var(--color-secondary-cta)',
            'secondary-cta-text': 'var(--color-secondary-cta-text)',
          },
          width: {
            'content-width': 'var(--width-content-width)',
          },
          borderRadius: {
            'theme': 'var(--theme-border-radius)',
            'theme-capped': 'var(--theme-border-radius-capped)',
          },
        }
      }
    }
  </script>

  <style>
    :root {
      --color-background: #003399;
      --color-foreground: #fafafa;
      --color-card: #383838;
      --color-border: #484848;
      --color-accent: #3b82f6;
      --radius-lg: 1rem;
      --theme-border-radius: var(--radius-lg);
      --width-content-width: clamp(20rem, 90vw, 100rem);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter Tight', sans-serif;
      background-color: var(--color-background);
      color: var(--color-foreground);
      overflow-x: hidden;
      max-width: 100%;
      min-height: 100vh;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: -10; width: 100%; height: 100%; }
    #beams-bg-container { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -5; pointer-events: none; overflow: hidden; background-color: var(--color-background); }
    #beams-canvas { position: absolute; inset: 0; filter: blur(15px); opacity: 0.8; }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center;
      height: 80px; background: rgba(0, 51, 153, 0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      width: 100%;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 120px 2rem 2rem; width: 100%; }
    .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; gap: 1rem; }
    .header h1 { font-size: clamp(2rem, 3vw, 2.5rem); font-weight: 600; text-align: center; }

    .btn-adicionar {
      padding: 0.75rem 2rem; background: var(--color-primary-cta);
      color: var(--color-primary-cta-text); font-weight: 600; border-radius: 8px;
      cursor: pointer; border: none; transition: 0.3s;
    }

    .products-area {
      background: rgba(45, 45, 45, 0.6); backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      padding: 1.5rem; color: #fff; overflow-x: auto;
      max-width: 100%;
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #ccc; font-size: 0.85rem; }
    td { padding: 16px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); vertical-align: middle; }

    .img-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
    .product-name { font-weight: 600; }
    .product-price { color: #3b82f6; font-weight: 700; }
    .actions { display: flex; gap: 10px; }
    
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
      padding: 2rem; width: 90%; max-width: 500px; color: #fff; max-height: 90vh; overflow-y: auto;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: #aaa; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff;
    }

    .upload-zone { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; }

    @media (max-width: 768px) {
      .navbar { padding: 0 1rem; justify-content: center; }
      .navbar > div { width: 100% !important; display: flex !important; justify-content: center !important; margin: 0 !important; max-width: 100% !important; }
      .navbar a:first-child { display: flex; justify-content: center; width: 100%; }
      .navbar img { margin: 0 auto !important; position: static !important; transform: none !important; }
      
      .container { padding: 100px 1rem 1rem !important; max-width: 100% !important; overflow-x: hidden !important; }
      .header { margin-bottom: 1.5rem !important; }
      .header h1 { font-size: 1.5rem !important; }
      .products-area { padding: 1rem !important; margin: 0 !important; width: 100% !important; box-sizing: border-box !important; }
      td { padding: 12px 8px !important; font-size: 0.8rem; }
      .img-thumb { width: 40px; height: 40px; }
      .btn-editar, .btn-excluir { padding: 0.4rem 0.6rem; font-size: 0.7rem; }
      
      #searchAdmin { width: 100% !important; }
      #btnNovaCat { white-space: nowrap; }
    }
  <link rel="stylesheet" href="mobile-fix.css">
</head>

<body class="antialiased">
  <div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #040914; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;"><div class="glass-card" style="width: 100%; max-width: 380px; padding: 2.5rem; text-align: center; border-radius: 16px; background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5);"><img src="logo.png" alt="Fulltime" style="max-height: 70px; margin-bottom: 1.5rem; display: block; margin-left: auto; margin-right: auto;"><h2 style="color: #fff; margin-bottom: 1.5rem;">Acesso Restrito</h2><input type="text" id="adminUser" placeholder="Usuário" style="width: 100%; margin-bottom: 1rem; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; box-sizing: border-box;"><input type="password" id="adminPass" placeholder="Senha" style="width: 100%; margin-bottom: 1.5rem; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; box-sizing: border-box;"><button id="loginBtn" style="width: 100%; padding: 12px; background: #FFD700; color: #000; font-weight: bold; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;">Entrar</button><p id="loginError" style="color: #ff4d4d; margin-top: 1rem; display: none; font-size: 0.9rem;">Credenciais inválidas.</p></div></div>
  <canvas id="bg-canvas"></canvas>
  <div id="beams-bg-container"><canvas id="beams-canvas"></canvas></div>

  <div id="nav"><nav class="navbar"><div class="relative flex items-center justify-between h-full w-content-width mx-auto"><a href="index.html"><img src="/logo.png" class="h-12 w-auto" alt="Fulltime" /></a><div class="hidden md:flex gap-6"><a href="suplementos.html">Loja</a><a href="#" id="logoutBtn">Sair</a></div></div></nav></div>

  <div class="container">
    <div class="header"><h1>Gestão de Produtos</h1><button class="btn-adicionar" onclick="abrirModalNovo()">➕ Novo Produto</button></div>
    <div style="display:flex; gap:10px; margin-bottom:1.5rem;"><input type="text" id="searchAdmin" placeholder="Buscar..." style="flex:1; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#fff;"><button id="btnNovaCat" style="padding:12px; background:#333; color:#fff; border-radius:8px; border:none; cursor:pointer;">Categorias</button></div>
    <div class="products-area"><table><thead><tr><th>Foto</th><th>Produto</th><th>Categoria</th><th>Preço</th><th>Ações</th></tr></thead><tbody id="products-list"></tbody></table></div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Produto</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-group"><label>Nome</label><input type="text" id="product-name" required></div>
        <div class="form-group"><label>Categoria</label><select id="produtoCategoria"></select></div>
        <div class="form-group"><label>Descrição</label><textarea id="produtoDescricao" rows="3"></textarea></div>
        <div class="form-group"><label>Preço</label><input type="text" id="product-price" required></div>
        <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
          <input type="file" id="imageInput" hidden accept="image/*">
          <div id="uploadContent">📁 Foto</div>
          <img id="imagePreview" style="display:none; width:100%; height:120px; object-fit:contain; margin-top:10px;">
        </div>
        <input type="hidden" id="product-image">
        <div style="display:flex; gap:10px; margin-top:1.5rem;"><button type="button" onclick="fecharModal()" style="flex:1; padding:12px; background:#333; color:#fff; border-radius:8px; border:none;">Cancelar</button><button type="submit" class="btn-salvar" style="flex:1; padding:12px; background:#3b82f6; color:#fff; border-radius:8px; border:none;">Salvar</button></div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if(sessionStorage.getItem("krm_admin_auth") === "true") document.getElementById("loginOverlay").style.display = "none";
      loadCategorias(); carregarProdutos();
    });

    document.getElementById("loginBtn").addEventListener("click", () => {
      const u = document.getElementById("adminUser").value, p = document.getElementById("adminPass").value;
      if(u === "AdminFulltime" && p === "AdminFulltime") { sessionStorage.setItem("krm_admin_auth", "true"); document.getElementById("loginOverlay").style.display = "none"; }
      else document.getElementById("loginError").style.display = "block";
    });

    document.getElementById("logoutBtn")?.addEventListener("click", () => { sessionStorage.removeItem("krm_admin_auth"); window.location.reload(); });

    let produtos = [], categorias = [];

    async function loadCategorias() {
      try {
        const res = await fetch('/api/categorias'); categorias = await res.json();
        document.getElementById('produtoCategoria').innerHTML = categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderCatManager();
      } catch (e) { console.error(e); }
    }

    function renderCatManager() {
      const list = document.getElementById('catManagerList'); if(!list) return;
      list.innerHTML = categorias.map((c, i) => `
        <div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:8px;">
          <span>${c}</span>
          <div style="display:flex; gap:12px;">
            <div onclick="editCat(${i})" style="cursor:pointer;"><svg width="16" height="16" fill="#fff" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5z"/></svg></div>
            <div onclick="deleteCat(${i})" style="cursor:pointer;"><svg width="16" height="16" fill="#fff" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/></svg></div>
          </div>
        </div>`).join('');
    }

    function editCat(i) { window.catEditIndex = i; document.getElementById('editCatInput').value = categorias[i]; document.getElementById('modalEdit').style.display = 'flex'; }
    async function deleteCat(i) { if(confirm("Excluir?")) { categorias.splice(i, 1); await fetch('/api/categorias', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({categorias}) }); loadCategorias(); } }

    const modalHTML = `<div id="modalCat" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(5px);"><div class="modal" style="max-width:400px; text-align:center;"><h3>Categorias</h3><div style="display:flex; gap:8px; margin:1.5rem 0;"><input type="text" id="inputNovaCat" style="flex:1; padding:10px; background:#000; border:1px solid #333; color:#fff;" placeholder="Nova..."><button id="salvarCatBtn" style="padding:10px; background:#FFD700; color:#000; font-weight:bold; border:none; border-radius:4px;">+</button></div><div id="catManagerList" style="max-height:200px; overflow-y:auto; text-align:left;"></div><button onclick="document.getElementById('modalCat').style.display='none'" style="width:100%; margin-top:1rem; padding:10px; background:#333; color:#fff; border:none;">Fechar</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const editModal = `<div id="modalEdit" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; flex-direction:column; align-items:center; justify-content:center;"><div class="modal" style="max-width:350px; text-align:center;"><h3>Editar</h3><input type="text" id="editCatInput" style="width:100%; padding:12px; background:#000; color:#fff; border:1px solid #333; margin:1rem 0;"><div style="display:flex; gap:10px;"><button onclick="document.getElementById('modalEdit').style.display='none'" style="flex:1; padding:10px; background:#333; color:#fff; border:none;">Cancelar</button><button id="saveEditCat" style="flex:1; padding:10px; background:#FFD700; color:#000; font-weight:bold; border:none;">Salvar</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', editModal);

    document.getElementById('btnNovaCat').onclick = () => document.getElementById('modalCat').style.display = 'flex';
    document.getElementById('salvarCatBtn').onclick = async () => { const v = document.getElementById('inputNovaCat').value.trim(); if(v) { categorias.push(v); await fetch('/api/categorias', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({categorias}) }); document.getElementById('inputNovaCat').value = ''; loadCategorias(); } };
    document.getElementById('saveEditCat').onclick = async () => { const v = document.getElementById('editCatInput').value.trim(); if(v && window.catEditIndex !== undefined) { categorias[window.catEditIndex] = v; await fetch('/api/categorias', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({categorias}) }); document.getElementById('modalEdit').style.display = 'none'; loadCategorias(); } };

    async function carregarProdutos() { const r = await fetch('/api/produtos'); produtos = await r.json(); renderizarProdutos(); }
    function renderizarProdutos(f = "") {
      const list = document.getElementById('products-list');
      let data = f ? produtos.filter(p => p.name.toLowerCase().includes(f.toLowerCase())) : produtos;
      data.sort((a,b) => (a.categoria||"").localeCompare(b.categoria||""));
      list.innerHTML = data.map(p => `<tr><td><img src="${p.imagem}" class="img-thumb"></td><td><b>${p.nome}</b><br><small style="color:#777;">${p.descricao||""}</small></td><td>${p.categoria||""}</td><td class="product-price">${p.preco}</td><td><div class="actions"><button class="btn-editar" onclick="editarProduto(${p.id})">Edit</button><button class="btn-excluir" onclick="excluirProduto(${p.id})">X</button></div></td></tr>`).join('');
    }
    document.getElementById('searchAdmin').oninput = (e) => renderizarProdutos(e.target.value);

    function abrirModalNovo() {
      document.getElementById('modal-title').textContent = 'Novo'; document.getElementById('product-id').value = '';
      document.getElementById('product-name').value = ''; document.getElementById('produtoCategoria').value = categorias[0]||'';
      document.getElementById('produtoDescricao').value = ''; document.getElementById('product-price').value = '';
      document.getElementById('imagePreview').style.display = 'none'; document.getElementById('uploadContent').style.display = 'block';
      document.getElementById('modal-overlay').classList.add('active');
    }

    function editarProduto(id) {
      const p = produtos.find(x => x.id === id); if(!p) return;
      document.getElementById('modal-title').textContent = 'Editar'; document.getElementById('product-id').value = p.id;
      document.getElementById('product-name').value = p.nome; document.getElementById('produtoCategoria').value = p.categoria||'';
      document.getElementById('produtoDescricao').value = p.descricao||''; document.getElementById('product-price').value = p.preco;
      document.getElementById('product-image').value = p.imagem; document.getElementById('imagePreview').src = p.imagem;
      document.getElementById('imagePreview').style.display = 'block'; document.getElementById('uploadContent').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }

    function fecharModal() { document.getElementById('modal-overlay').classList.remove('active'); }

    async function excluirProduto(id) { if(confirm("Excluir?")) { produtos = produtos.filter(p => p.id !== id); await fetch('/api/produtos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({produtos}) }); carregarProdutos(); } }

    document.getElementById('product-form').onsubmit = async (e) => {
      e.preventDefault(); const id = document.getElementById('product-id').value;
      const data = { 
        id: id ? Number(id) : (produtos.length ? Math.max(...produtos.map(p => p.id)) + 1 : 1),
        nome: document.getElementById('product-name').value,
        categoria: document.getElementById('produtoCategoria').value,
        descricao: document.getElementById('produtoDescricao').value,
        preco: document.getElementById('product-price').value,
        imagem: document.getElementById('product-image').value
      };
      if(id) { const i = produtos.findIndex(x => x.id == id); produtos[i] = data; } else { produtos.push(data); }
      await fetch('/api/produtos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({produtos}) });
      fecharModal(); carregarProdutos();
    };

    document.getElementById('imageInput').onchange = (e) => {
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader(); r.onload = (ev) => {
        const img = new Image(); img.onload = () => {
          const c = document.createElement('canvas'); let w = img.width, h = img.height;
          if(w > h) { if(w > 800) { h *= 800/w; w = 800; } } else { if(h > 800) { w *= 800/h; h = 800; } }
          c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
          const base64 = c.toDataURL("image/jpeg", 0.8);
          document.getElementById('imagePreview').src = base64; document.getElementById('imagePreview').style.display = 'block';
          document.getElementById('uploadContent').style.display = 'none'; document.getElementById('product-image').value = base64;
        }; img.src = ev.target.result;
      }; r.readAsDataURL(f);
    };

    (function animateBG() {
      const c = document.getElementById('bg-canvas'); if(!c) return; const ctx = c.getContext('2d');
      let t = 0; function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
      window.onresize = res; res();
      function draw() {
        t += 0.005; ctx.clearRect(0,0,c.width,c.height);
        const grad = ctx.createRadialGradient(c.width/2, c.height/2, 0, c.width/2, c.height/2, Math.max(c.width,c.height));
        grad.addColorStop(0, 'rgba(59, 130, 246, 0.05)'); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.fillRect(0,0,c.width,c.height); requestAnimationFrame(draw);
      } draw();
    })();
  </script>
</body>
</html>
